version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nice-land-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_this_to_a_strong_prod_password
      POSTGRES_DB: nice_land
    volumes:
      - nice_land_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nice_land"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nice-land-api
    restart: always
    networks:
      - default
      - proxy-tier
    entrypoint: >
      sh -c "
        echo 'Running database migrations...' &&
        npx prisma@6 migrate deploy --schema ../../packages/database/prisma/schema.prisma &&
        echo 'Starting application...' &&
        node dist/server.js
      "
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgresql://postgres:change_this_to_a_strong_prod_password@db:5432/nice_land?sslmode=disable
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-nice-land-prod-access-secret-2026}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-nice_land_refresh}
      ROOT_DOMAIN: ${ROOT_DOMAIN:-nice-land.id.vn}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://nice-land.id.vn,https://*.nice-land.id.vn,http://localhost:3002}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PUBLIC_URL: ${AWS_S3_PUBLIC_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      db:
        condition: service_healthy

networks:
  proxy-tier:
    external: true

volumes:
  nice_land_pgdata:
